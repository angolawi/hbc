services:
  db:
    image: postgres:15-alpine
    container_name: hbc_db
    restart: always
    environment:
      POSTGRES_USER: user_hbc
      POSTGRES_PASSWORD: password_hbc
      POSTGRES_DB: hbc_db
    ports:
      - "5454:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: 
      context: ./server
    container_name: hbc_api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://user_hbc:password_hbc@db:5432/hbc_db
      PORT: 3001
    ports:
      - "3001:3001"
    restart: always

  web:
    build:
      context: .
    container_name: hbc_web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: hbc_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: hbc_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    restart: always

volumes:
  postgres_data:
  grafana_data:
